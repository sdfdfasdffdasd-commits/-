<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ささやき ASMR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 500;
    background: #000000;
    color: #FFFFFF;
    min-height: 100vh;
  }

  .wa-serif { font-family: 'Shippori Mincho', serif; }

  #root {
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wrap {
    width: 100%;
    max-width: 28rem;
    min-width: 0;
    padding: 2.5rem 1.5rem 4rem 1.5rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  @keyframes wa-breathe {
    0%, 100% { box-shadow: 0 0 40px 6px rgba(207,161,102,0.10), 0 0 0 1px rgba(207,161,102,0.14); }
    50% { box-shadow: 0 0 64px 14px rgba(207,161,102,0.22), 0 0 0 1px rgba(207,161,102,0.28); }
  }
  .wa-breathe { animation: wa-breathe 3.6s ease-in-out infinite; }

  @keyframes wa-drift {
    0% { transform: translateY(0px); opacity: 0.55; }
    50% { transform: translateY(-6px); opacity: 0.9; }
    100% { transform: translateY(0px); opacity: 0.55; }
  }
  .wa-drift { animation: wa-drift 4.5s ease-in-out infinite; }

  @keyframes wa-rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .wa-rise { animation: wa-rise 0.5s ease both; }

  @keyframes wa-flip {
    0% { transform: rotateX(90deg); opacity: 0; }
    100% { transform: rotateX(0deg); opacity: 1; }
  }
  .wa-flip { animation: wa-flip 0.55s cubic-bezier(.2,.8,.2,1) both; transform-style: preserve-3d; }

  .wa-scrollbar::-webkit-scrollbar { width: 4px; }
  .wa-scrollbar::-webkit-scrollbar-thumb { background: rgba(207,161,102,0.25); border-radius: 4px; }

  .wa-input::placeholder { color: #CCCCCC; opacity: 1; }

  .hidden { display: none !important; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #FFFFFF;
    margin-bottom: 0.5rem;
  }
  .title {
    font-size: 1.875rem;
    letter-spacing: 0.05em;
    color: #FFFFFF;
    margin: 0;
  }
  .header { text-align: center; margin-bottom: 2rem; }

  .desc {
    font-size: 0.875rem;
    line-height: 1.7;
    color: #FFFFFF;
    margin-bottom: 1.5rem;
  }

  .input-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .wa-input {
    flex: 1;
    min-width: 0;
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    outline: none;
    background: #1D1922;
    border: 1px solid rgba(207,161,102,0.2);
    color: #FFFFFF;
  }
  .btn-add {
    flex-shrink: 0;
    padding: 0 1.25rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    background: #CFA166;
    color: #1a1520;
    border: none;
    cursor: pointer;
  }

  .divider-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
    color: #FFFFFF;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(139,132,120,0.25); }
  .divider-text { font-size: 0.75rem; font-variant-numeric: tabular-nums; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    overflow-y: auto;
    max-height: 120px;
  }
  .chip {
    width: 2rem;
    height: 2rem;
    border-radius: 0.375rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #241F2C;
    border: 1px solid rgba(207,161,102,0.18);
  }
  .chip span { font-size: 0.75rem; color: #CFA166; }

  .mt-auto { margin-top: auto; }

  .btn-primary {
    width: 100%;
    padding: 1rem;
    border-radius: 0.75rem;
    font-size: 1.125rem;
    letter-spacing: 0.025em;
    border: none;
    cursor: pointer;
    background: #CFA166;
    color: #1a1520;
  }
  .btn-primary:disabled {
    background: #241F2C;
    color: #DDDDDD;
    cursor: not-allowed;
  }
  .hint {
    text-align: center;
    font-size: 0.75rem;
    margin-top: 0.75rem;
    color: #DDDDDD;
  }
  .reset-link {
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    margin-top: 1.25rem;
    text-decoration: underline;
    text-underline-offset: 2px;
    background: none;
    border: none;
    color: #999999;
    cursor: pointer;
  }

  .center-flex {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .card-back {
    position: relative;
    width: 14rem;
    height: 18rem;
    border-radius: 1rem;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(155deg, #241F2C 0%, #1D1922 100%);
    border: 1px solid rgba(207,161,102,0.25);
  }
  .card-back-inner {
    position: absolute;
    width: 12rem;
    height: 16rem;
    border-radius: 0.75rem;
    border: 1px solid rgba(207,161,102,0.15);
  }
  .card-back .q { font-size: 3rem; color: rgba(207,161,102,0.5); }

  .deck-count { font-size: 0.875rem; margin-bottom: 0.25rem; color: #FFFFFF; }
  .deck-hint { font-size: 0.75rem; margin-bottom: 2rem; color: #DDDDDD; }

  .peek-hint { font-size: 0.75rem; margin-bottom: 1.25rem; letter-spacing: 0.025em; color: #B98393; }

  .card-front {
    width: 16rem;
    min-height: 18rem;
    border-radius: 1rem;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 2rem;
    background: linear-gradient(155deg, #2a2432 0%, #1D1922 100%);
    border: 1px solid rgba(207,161,102,0.35);
    box-shadow: 0 0 50px 8px rgba(207,161,102,0.12);
  }
  .card-front span { text-align: center; line-height: 1.4; color: #FFFFFF; }

  .progress { font-size: 0.75rem; margin-bottom: 1.5rem; font-variant-numeric: tabular-nums; color: #DDDDDD; }

  .empty-title { font-size: 1.5rem; margin-bottom: 0.75rem; color: #FFFFFF; }
  .empty-desc { font-size: 0.875rem; margin-bottom: 2.5rem; color: #FFFFFF; }

  .btn-col { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; }
  .btn-outline {
    width: 100%;
    padding: 1rem;
    border-radius: 0.75rem;
    font-size: 1.125rem;
    letter-spacing: 0.025em;
    background: transparent;
    color: #FFFFFF;
    border: 1px solid rgba(139,132,120,0.3);
    cursor: pointer;
  }

  .footer {
    padding-bottom: 1rem;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #555555;
  }
</style>
</head>
<body>
<div id="root">
  <div class="wrap">
    <div class="header wa-rise">
      <div class="eyebrow">TWO PLAYER WHISPER GAME</div>
      <h1 class="title wa-serif">ささやき ASMR</h1>
    </div>

    <div id="phase-loading" class="center-flex">
      <span style="font-size:0.875rem;color:#CCCCCC;">読み込み中…</span>
    </div>

    <div id="phase-setup" class="hidden wa-rise" style="flex:1;display:flex;flex-direction:column;">
      <p class="desc">二人で自由に言葉を入れてください。相手に見せずに、こっそり入れてください。どんな言葉でもかまいません。たまった言葉はシャッフルされ、めくった人だけが見て、隣の人の耳元でささやきます。聞く人は目を閉じてください。</p>

      <div class="input-row">
        <input id="word-input" class="wa-input" type="text" placeholder="言葉をひとつ" />
        <button id="btn-add-word" class="btn-add">追加</button>
      </div>

      <div class="divider-row">
        <div class="divider-line"></div>
        <span class="divider-text">たまった言葉　<span id="word-count">0</span></span>
        <div class="divider-line"></div>
      </div>

      <div id="chips" class="chips wa-scrollbar"></div>

      <div class="mt-auto">
        <button id="btn-shuffle" class="btn-primary wa-serif" disabled>シャッフルする</button>
        <p id="need-more-hint" class="hint">あと 2 語で始められます</p>
        <button id="btn-reset-all" class="reset-link hidden">保存した言葉をすべて消す</button>
      </div>
    </div>

    <div id="phase-ready" class="hidden center-flex wa-rise">
      <div class="card-back wa-breathe">
        <div class="card-back-inner"></div>
        <span class="q wa-serif">?</span>
      </div>
      <p class="deck-count">残り <span id="deck-remaining">0</span> 枚</p>
      <p class="deck-hint">めくった人だけが見て、耳元でささやいてください</p>
      <button id="btn-draw" class="btn-primary wa-serif" style="width:auto;padding:1rem 2.5rem;">1枚めくる</button>
    </div>

    <div id="phase-drawn" class="hidden center-flex">
      <p class="peek-hint">自分だけ見て、そっと耳元へ</p>
      <div id="card-front" class="card-front wa-flip">
        <span id="current-word" class="wa-serif"></span>
      </div>
      <p class="progress"><span id="drawn-count">0</span> / <span id="drawn-total">0</span></p>
      <button id="btn-next" class="btn-primary wa-serif" style="width:auto;padding:1rem 2.5rem;">つぎへ</button>
    </div>

    <div id="phase-empty" class="hidden center-flex wa-rise">
      <span class="empty-title wa-serif">言葉が尽きました</span>
      <p class="empty-desc"><span id="empty-total">0</span> 語、すべてささやき終えました</p>
      <div class="btn-col">
        <button id="btn-reshuffle" class="btn-primary wa-serif">もう一度シャッフルする</button>
        <button id="btn-restart" class="btn-outline wa-serif">はじめから</button>
      </div>
    </div>
  </div>

  <div class="footer">build 2026-07-10-09</div>
</div>

<script>
(function () {
  const STORAGE_KEY = "sasayaki-words";
  const DEFAULT_WORDS = ["ひみつ", "だいすき", "おやすみ", "ないしょ", "そっと", "やさしい"];

  let pool = [];
  let deck = [];
  let discard = [];
  let current = null;

  const els = {
    loading: document.getElementById("phase-loading"),
    setup: document.getElementById("phase-setup"),
    ready: document.getElementById("phase-ready"),
    drawn: document.getElementById("phase-drawn"),
    empty: document.getElementById("phase-empty"),
    wordInput: document.getElementById("word-input"),
    btnAdd: document.getElementById("btn-add-word"),
    wordCount: document.getElementById("word-count"),
    chips: document.getElementById("chips"),
    btnShuffle: document.getElementById("btn-shuffle"),
    needMoreHint: document.getElementById("need-more-hint"),
    btnResetAll: document.getElementById("btn-reset-all"),
    deckRemaining: document.getElementById("deck-remaining"),
    btnDraw: document.getElementById("btn-draw"),
    cardFront: document.getElementById("card-front"),
    currentWord: document.getElementById("current-word"),
    drawnCount: document.getElementById("drawn-count"),
    drawnTotal: document.getElementById("drawn-total"),
    btnNext: document.getElementById("btn-next"),
    emptyTotal: document.getElementById("empty-total"),
    btnReshuffle: document.getElementById("btn-reshuffle"),
    btnRestart: document.getElementById("btn-restart"),
  };

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function persist(nextPool) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextPool));
    } catch (e) {
      // saving failed silently; words still work for this session
    }
  }

  function loadPool() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        pool = Array.isArray(saved) ? saved : [];
      } else {
        pool = [...DEFAULT_WORDS];
        persist(pool);
      }
    } catch (e) {
      pool = [...DEFAULT_WORDS];
    }
  }

  function showPhase(name) {
    ["loading", "setup", "ready", "drawn", "empty"].forEach((p) => {
      els[p].classList.toggle("hidden", p !== name);
    });
  }

  function renderSetup() {
    els.wordCount.textContent = pool.length;
    els.chips.innerHTML = "";
    pool.forEach((_, i) => {
      const chip = document.createElement("div");
      chip.className = "chip wa-drift";
      chip.style.animationDelay = `${(i % 6) * 0.3}s`;
      chip.innerHTML = `<span class="wa-serif">語</span>`;
      els.chips.appendChild(chip);
    });

    const canStart = pool.length >= 2;
    els.btnShuffle.disabled = !canStart;
    els.needMoreHint.classList.toggle("hidden", canStart);
    if (!canStart) {
      els.needMoreHint.textContent = `あと ${2 - pool.length} 語で始められます`;
    }
    els.btnResetAll.classList.toggle("hidden", pool.length === 0);
  }

  function addWord() {
    const w = els.wordInput.value.trim();
    if (!w) return;
    pool.push(w);
    persist(pool);
    els.wordInput.value = "";
    renderSetup();
  }

  function startShuffle() {
    if (pool.length < 2) return;
    deck = shuffle(pool);
    discard = [];
    showPhase("ready");
    els.deckRemaining.textContent = deck.length;
  }

  function draw() {
    if (deck.length === 0) {
      showEmpty();
      return;
    }
    current = deck[0];
    deck = deck.slice(1);
    showPhase("drawn");
    els.currentWord.textContent = current;
    els.currentWord.style.fontSize = current && current.length > 8 ? "1.5rem" : "2rem";
    const drawnCount = discard.length + 1;
    els.drawnCount.textContent = drawnCount;
    els.drawnTotal.textContent = pool.length;
    // restart flip animation
    els.cardFront.classList.remove("wa-flip");
    void els.cardFront.offsetWidth;
    els.cardFront.classList.add("wa-flip");
  }

  function nextCard() {
    discard.push(current);
    if (deck.length === 0) {
      showEmpty();
    } else {
      draw();
    }
  }

  function showEmpty() {
    showPhase("empty");
    els.emptyTotal.textContent = pool.length;
  }

  function reshuffle() {
    deck = shuffle([...discard]);
    discard = [];
    showPhase("ready");
    els.deckRemaining.textContent = deck.length;
  }

  function resetAll() {
    pool = [];
    deck = [];
    discard = [];
    current = null;
    persist(pool);
    showPhase("setup");
    renderSetup();
    els.wordInput.focus();
  }

  els.btnAdd.addEventListener("click", addWord);
  els.wordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addWord();
  });
  els.btnShuffle.addEventListener("click", startShuffle);
  els.btnResetAll.addEventListener("click", resetAll);
  els.btnDraw.addEventListener("click", draw);
  els.btnNext.addEventListener("click", nextCard);
  els.btnReshuffle.addEventListener("click", reshuffle);
  els.btnRestart.addEventListener("click", resetAll);

  // init
  loadPool();
  showPhase("setup");
  renderSetup();
  els.wordInput.focus();
})();
</script>
</body>
</html>
